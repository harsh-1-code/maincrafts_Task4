<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h2>Admin Control Panel</h2>
    <p>Welcome, Administrator! Here you can monitor system access.</p>
    
    <div style="margin-bottom: 20px;">
        <a href="/students"><button>Go to Student Management</button></a>
        <a href="/logout" style="float: right;">Logout</a>
    </div>

    <h3>Registered Users</h3>
    <table>
        <tr>
            <th>User ID</th>
            <th>Username</th>
            <th>Account Role</th>
        </tr>
        
        {% for u in users %}
        <tr>
            <td>{{ u['id'] }}</td>
            <td>{{ u['username'] }}</td>
            <td style="font-weight: bold;">
                {{ u['role'] }}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
